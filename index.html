<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Smart Grocery"/>
<meta name="theme-color" content="#1d9e75"/>
<meta name="description" content="Smart Grocery Optimizer – compare stores, scan lists, save money"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Smart Grocery</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a1a;height:100%;overflow:hidden;}
#root{max-width:480px;margin:0 auto;background:#fff;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;}
input,select,textarea,button{font-family:inherit;outline:none;}
input[type=text],input[type=search],input[type=password],textarea{border:0.5px solid #ddd;border-radius:10px;padding:9px 12px;font-size:14px;width:100%;background:#fff;color:#1a1a1a;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:#1d9e75;box-shadow:0 0 0 3px #1d9e7518;}
input[type=range]{width:100%;accent-color:#1d9e75;height:4px;}
button{border:0.5px solid #ddd;border-radius:10px;padding:8px 14px;font-size:13px;background:#fff;color:#1a1a1a;cursor:pointer;}
button:active{opacity:0.75;}
select{border:0.5px solid #ddd;border-radius:8px;padding:6px 8px;font-size:13px;background:#fff;color:#1a1a1a;-webkit-appearance:none;}
details>summary{list-style:none;}details>summary::-webkit-details-marker{display:none;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
::-webkit-scrollbar{display:none;}
@media(prefers-color-scheme:dark){
  body{background:#111;}
  #root{background:#1a1a1a;}
  input[type=text],input[type=password],textarea,button,select{background:#2a2a2a;color:#f0f0f0;border-color:#333;}
  input:focus,textarea:focus{border-color:#1d9e75;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

const DB_NAME="SmartGroceryDB",DB_VER=1;
const STORE_NAMES={list:"groceryList",history:"history",settings:"settings",stores:"customStores"};

const CAT_COLORS={
  dairy:{bg:"#b5d4f4",text:"#0c447c"},
  produce:{bg:"#c0dd97",text:"#27500a"},
  pantry:{bg:"#fac775",text:"#633806"},
  meat:{bg:"#f5c4b3",text:"#712b13"},
  bakery:{bg:"#f4c0d1",text:"#72243e"},
  beverages:{bg:"#cecbf6",text:"#3c3489"},
  frozen:{bg:"#b5d4f4",text:"#185fa5"},
  household:{bg:"#d3d1c7",text:"#444441"},
  spices:{bg:"#f0997b",text:"#712b13"},
  snacks:{bg:"#9fe1cb",text:"#085041"},
  "rice/grains":{bg:"#fac775",text:"#633806"},
};
const ALL_CATS=Object.keys(CAT_COLORS);
const BASE_PRICES={dairy:4.5,produce:3.2,pantry:2.8,meat:8.5,bakery:3.5,beverages:4.2,frozen:5.5,household:6.0,spices:3.0,snacks:2.5,"rice/grains":2.8};

/* stores & seed loaded from JSON files at runtime — see load() below */
let STORE_CATALOG={};
let CAT_META={};
let INIT_HISTORY=[];

const TYPE_META={
  mainstream:{label:"Mainstream",color:"#378add"},
  warehouse: {label:"Warehouse", color:"#854f0b"},
  indian:    {label:"Indian",    color:"#d85a30"},
  korean:    {label:"Korean",    color:"#7f77dd"},
  asian:     {label:"Asian",     color:"#1d9e75"},
  custom:    {label:"Custom",    color:"#888780"},
};
const TIER_LABELS={1:"Budget",2:"Mid-range",3:"Premium"};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function guessCat(n){
  n=(n||"").toLowerCase();
  if(/milk|cheese|yogurt|butter|cream|paneer|ghee/.test(n))return"dairy";
  if(/egg/.test(n))return"dairy";
  if(/apple|banana|spinach|broccoli|tomato|onion|garlic|berry|fruit|vegetable|carrot|mango|avocado|pepper|lettuce|cucumber/.test(n))return"produce";
  if(/chicken|beef|pork|salmon|fish|shrimp|lamb|turkey|meat|mutton|goat/.test(n))return"meat";
  if(/bread|roll|bagel|muffin|roti|naan|pita/.test(n))return"bakery";
  if(/rice|flour|chapati|atta|lentil|dal|quinoa|oat|barley|semolina/.test(n))return"rice/grains";
  if(/turmeric|cumin|garam|masala|chili|spice|coriander|cardamom|cinnamon|clove|jeera|pepper|paprika/.test(n))return"spices";
  if(/juice|soda|water|tea|coffee|drink|lassi|kombucha/.test(n))return"beverages";
  if(/frozen|ice cream|pizza|dumpling/.test(n))return"frozen";
  if(/soap|detergent|paper|towel|tissue|shampoo|toothpaste|cleaner|bleach/.test(n))return"household";
  if(/chip|snack|cracker|nuts|candy|chocolate|biscuit|namkeen|popcorn/.test(n))return"snacks";
  return"pantry";
}
function parseTextList(raw){
  return raw.split(/\n|;/).map(l=>l.trim()).filter(Boolean).map(line=>{
    line=line.replace(/^[-•*\d.]+\s*/,"");
    const m=line.match(/^(\d+)\s*[x×]\s*(.+)/i)||line.match(/^(.+?)\s+[x×]\s*(\d+)$/i);
    let name=line,qty=1;
    if(m){if(/^\d/.test(line)){qty=parseInt(m[1]);name=m[2];}else{name=m[1];qty=parseInt(m[2]);}}
    name=name.replace(/\$[\d.]+/g,"").replace(/\(.*?\)/g,"").replace(/^\W+|\W+$/g,"").replace(/\s+/g," ").trim();
    if(!name||name.length<2)return null;
    return{id:uid(),name,qty:isNaN(qty)?1:Math.max(1,qty),category:guessCat(name)};
  }).filter(Boolean);
}

/* ── IndexedDB ── */
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      Object.values(STORE_NAMES).forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:"id"});});
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function dbGetAll(s){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(s,"readonly");const r=tx.objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbPut(s,obj){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(s,"readwrite");tx.objectStore(s).put(obj);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function dbDelete(s,id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(s,"readwrite");tx.objectStore(s).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function dbClear(s){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(s,"readwrite");tx.objectStore(s).clear();tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function getStorageInfo(){
  if(navigator.storage&&navigator.storage.estimate){
    const{usage,quota}=await navigator.storage.estimate();
    return{usage:Math.round((usage||0)/1024),quota:Math.round((quota||0)/1024/1024),pct:quota?Math.round((usage/quota)*100):0};
  }
  return{usage:0,quota:0,pct:0};
}

/* ── App ── */
function App(){
  const[tab,setTab]=useState("list");
  const[list,setList]=useState([]);
  const[history,setHistory]=useState([]);
  const[checked,setChecked]=useState({});
  const[newItem,setNewItem]=useState("");
  const[newCat,setNewCat]=useState("pantry");
  const[newQty,setNewQty]=useState(1);
  const[preferredStores,setPreferredStores]=useState(["aldi","walmart","foodlion","patelBros","lottePlaza","costco","samsclub"]);
  const[customStores,setCustomStores]=useState([]);
  const[locationInput,setLocationInput]=useState("Hanover, MD");
  const[radius,setRadius]=useState(10);
  const[apiKey,setApiKey]=useState("");
  const[showApiKey,setShowApiKey]=useState(false);
  const[scanModal,setScanModal]=useState(false);
  const[scanMode,setScanMode]=useState("text");
  const[scanText,setScanText]=useState("");
  const[emailText,setEmailText]=useState("");
  const[scanPreview,setScanPreview]=useState([]);
  const[scanError,setScanError]=useState("");
  const[imgProcessing,setImgProcessing]=useState(false);
  const[histEdit,setHistEdit]=useState(false);
  const[selHist,setSelHist]=useState({});
  const[addStorePanel,setAddStorePanel]=useState(false);
  const[newStore,setNewStore]=useState({name:"",address:"",specialty:""});
  const[storageInfo,setStorageInfo]=useState({usage:0,quota:0,pct:0});
  const[isOnline,setIsOnline]=useState(navigator.onLine);
  const[showInstall,setShowInstall]=useState(false);
  const[deferredPrompt,setDeferredPrompt]=useState(null);
  const[dbReady,setDbReady]=useState(false);
  const fileRef=useRef();
  const camRef=useRef();

  useEffect(()=>{
    async function load(){
      try{
        /* 1. Fetch JSON data files (served from GitHub Pages, cached by SW offline) */
        const [storesRes, seedRes] = await Promise.all([
          fetch("./stores.json"), fetch("./seed.json")
        ]);
        const storesArr = await storesRes.json();
        const seedData  = await seedRes.json();

        /* 2. Build runtime lookups from JSON */
        storesArr.forEach(s=>{ STORE_CATALOG[s.id]=s; });
        CAT_META    = seedData.categories;
        INIT_HISTORY= seedData.history;

        /* 3. Load IndexedDB */
        const[ld,hd,sd,cd]=await Promise.all([dbGetAll(STORE_NAMES.list),dbGetAll(STORE_NAMES.history),dbGetAll(STORE_NAMES.settings),dbGetAll(STORE_NAMES.stores)]);
        if(ld.length)setList(ld);
        else{
          const map={};
          INIT_HISTORY.forEach(h=>h.items.forEach(it=>{const k=it.name.toLowerCase();if(map[k])map[k].qty+=it.qty;else map[k]={...it,id:uid()};}));
          const seeded=Object.values(map);
          setList(seeded);
          await Promise.all(seeded.map(it=>dbPut(STORE_NAMES.list,it)));
        }
        setHistory(hd.length?hd:[...INIT_HISTORY]);
        if(!hd.length)await Promise.all(INIT_HISTORY.map(h=>dbPut(STORE_NAMES.history,h)));
        const sm=Object.fromEntries(sd.map(s=>[s.id,s.value]));
        if(sm.location)setLocationInput(sm.location);
        if(sm.radius)setRadius(+sm.radius);
        if(sm.apiKey)setApiKey(sm.apiKey);
        if(sm.preferredStores)setPreferredStores(JSON.parse(sm.preferredStores));
        setCustomStores(cd);
        setDbReady(true);
        getStorageInfo().then(setStorageInfo);
      }catch(e){console.error(e);setDbReady(true);}
    }
    load();
    const goOn=()=>setIsOnline(true),goOff=()=>setIsOnline(false);
    window.addEventListener("online",goOn);window.addEventListener("offline",goOff);
    window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();setDeferredPrompt(e);setShowInstall(true);});
    if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
    return()=>{window.removeEventListener("online",goOn);window.removeEventListener("offline",goOff);};
  },[]);

  const saveListItem=useCallback(async it=>dbPut(STORE_NAMES.list,it),[]);
  const delListItem=useCallback(async id=>dbDelete(STORE_NAMES.list,id),[]);
  const saveSetting=useCallback(async(k,v)=>dbPut(STORE_NAMES.settings,{id:k,value:v}),[]);
  const refreshStorage=useCallback(()=>getStorageInfo().then(setStorageInfo),[]);

  async function addItem(){
    if(!newItem.trim())return;
    const item={id:uid(),name:newItem.trim(),category:newCat,qty:newQty};
    setList(l=>[...l,item]);await saveListItem(item);setNewItem("");setNewQty(1);refreshStorage();
  }
  async function removeItem(id){setList(l=>l.filter(i=>i.id!==id));await delListItem(id);refreshStorage();}
  function toggleCheck(id){setChecked(c=>({...c,[id]:!c[id]}));}
  async function clearChecked(){
    const ids=Object.entries(checked).filter(([,v])=>v).map(([k])=>k);
    setList(l=>l.filter(i=>!ids.includes(i.id)));setChecked({});
    await Promise.all(ids.map(id=>delListItem(id)));refreshStorage();
  }
  async function updateQty(id,d){
    setList(l=>{const u=l.map(it=>it.id===id?{...it,qty:Math.max(1,it.qty+d)}:it);u.forEach(it=>{if(it.id===id)saveListItem(it);});return u;});
  }
  async function updateItemCat(id,cat){
    setList(l=>{const u=l.map(it=>it.id===id?{...it,category:cat}:it);u.forEach(it=>{if(it.id===id)saveListItem(it);});return u;});
  }

  async function handleLocation(v){setLocationInput(v);await saveSetting("location",v);}
  async function handleRadius(v){setRadius(v);await saveSetting("radius",String(v));}
  async function handleApiKey(v){setApiKey(v);await saveSetting("apiKey",v);}
  async function handleStores(ids){setPreferredStores(ids);await saveSetting("preferredStores",JSON.stringify(ids));}

  async function addWeekToList(wid){
    const wk=history.find(h=>h.id===wid);if(!wk)return;
    const upd=[...list];const toSave=[];
    wk.items.forEach(it=>{const ex=upd.find(x=>x.name.toLowerCase()===it.name.toLowerCase());if(ex){ex.qty+=it.qty;toSave.push(ex);}else{const ni={...it,id:uid()};upd.push(ni);toSave.push(ni);}});
    setList(upd);await Promise.all(toSave.map(i=>saveListItem(i)));refreshStorage();
  }
  async function deleteHistWeek(id){setHistory(h=>h.filter(x=>x.id!==id));await dbDelete(STORE_NAMES.history,id);refreshStorage();}
  async function deleteSelHistItems(){
    const upd=history.map(h=>({...h,items:h.items.filter((_,i)=>!selHist[`${h.id}::${i}`])})).filter(h=>h.items.length>0);
    setHistory(upd);setSelHist({});await dbClear(STORE_NAMES.history);await Promise.all(upd.map(h=>dbPut(STORE_NAMES.history,h)));refreshStorage();
  }

  function parseScan(){setScanError("");const items=parseTextList(scanText);if(!items.length){setScanError("No items found. Try one item per line.");return;}setScanPreview(items);}
  async function confirmScan(){
    const wid=uid(),wlabel=`Scanned ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
    const nw={id:wid,week:wlabel,items:scanPreview.map(({name,category,qty})=>({name,category,qty}))};
    setHistory(h=>[nw,...h]);await dbPut(STORE_NAMES.history,nw);
    const upd=[...list];const toSave=[];
    scanPreview.forEach(it=>{const ex=upd.find(x=>x.name.toLowerCase()===it.name.toLowerCase());if(ex){ex.qty+=it.qty;toSave.push(ex);}else{const ni={...it,id:uid()};upd.push(ni);toSave.push(ni);}});
    setList(upd);await Promise.all(toSave.map(i=>saveListItem(i)));
    setScanModal(false);setScanText("");setScanPreview([]);setEmailText("");setScanError("");refreshStorage();
  }
  async function handleImage(e){
    const file=e.target.files[0];if(!file)return;
    if(!apiKey){setScanError("Add your Anthropic API key in Settings to use photo scanning.");return;}
    setImgProcessing(true);setScanError("");
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const b64=reader.result.split(",")[1];
        const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:'Extract all grocery items from this image. Return ONLY a JSON array: [{"name":"Milk","qty":1}]. No markdown, no explanation.'}
          ]}]})});
        const data=await res.json();
        const raw=data.content?.find(b=>b.type==="text")?.text||"[]";
        const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
        setScanPreview(parsed.map(it=>({id:uid(),name:it.name||"",qty:it.qty||1,category:guessCat(it.name||"")})).filter(i=>i.name));
      }catch{setScanError("Could not read image. Try typing the list instead.");}
      setImgProcessing(false);
    };
    reader.readAsDataURL(file);
  }

  async function addCustomStore(){
    if(!newStore.name.trim())return;
    const id="custom_"+uid();
    const specs=newStore.specialty.split(",").map(s=>s.trim()).filter(Boolean);
    const mult={};Object.keys(BASE_PRICES).forEach(c=>{mult[c]=1.0;});specs.forEach(c=>{if(c in mult)mult[c]=0.7;});
    const s={id,name:newStore.name.trim(),address:newStore.address.trim(),flag:"📍",tier:2,type:"custom",strengths:specs.length?specs:["general"],mult};
    setCustomStores(cs=>[...cs,s]);await dbPut(STORE_NAMES.stores,s);
    await handleStores([...preferredStores,id]);
    setNewStore({name:"",address:"",specialty:""});setAddStorePanel(false);refreshStorage();
  }

  async function installApp(){
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    if(outcome==="accepted")setShowInstall(false);
    setDeferredPrompt(null);
  }

  const ALL_CATS=Object.keys(CAT_META||CAT_COLORS);
  const BASE_PRICES=Object.fromEntries(Object.entries(CAT_META||{}).map(([k,v])=>[k,v.basePrice||3.5]));
  const CAT_COLORS_RT=Object.fromEntries(Object.entries(CAT_META||{}).map(([k,v])=>[k,{bg:v.bg,text:v.text}]));
  const activeIds=preferredStores.filter(id=>allStores[id]);
  const storeTotals=activeIds.map(id=>({id,store:allStores[id],total:list.reduce((s,it)=>s+(BASE_PRICES[it.category]||3.5)*(allStores[id].mult[it.category]||1)*it.qty,0)})).sort((a,b)=>a.total-b.total);
  const minTotal=storeTotals[0]?.total||0;
  const catGroups={};list.forEach(it=>{if(!catGroups[it.category])catGroups[it.category]=[];catGroups[it.category].push(it);});
  const freqMap={};history.forEach(h=>h.items.forEach(it=>{const k=it.name.toLowerCase();freqMap[k]=(freqMap[k]||0)+1;}));
  const checkedCount=Object.values(checked).filter(Boolean).length;
  const G="#1d9e75";
  const T=t=>({flex:1,padding:"9px 0",fontSize:11,fontWeight:tab===t?600:400,background:"transparent",border:"none",borderBottom:tab===t?`2.5px solid ${G}`:"2px solid transparent",color:tab===t?G:"#999",cursor:"pointer"});

  if(!dbReady)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12}}>
      <div style={{width:48,height:48,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      </div>
      <div style={{fontSize:14,color:"#888"}}>Loading your data…</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

      {!isOnline&&<div style={{background:"#f59e0b",color:"#fff",fontSize:12,textAlign:"center",padding:"5px",fontWeight:500}}>Offline — app works fully without internet</div>}

      <div style={{padding:"12px 14px 0",borderBottom:"0.5px solid #eee",background:"#fff",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:"#111"}}>Smart Grocery</div>
            <div style={{fontSize:11,color:"#999"}}>{locationInput} · {radius}mi · {activeIds.length} stores · {isOnline?"🟢":"🔴"}</div>
          </div>
          <button onClick={()=>setScanModal(true)} style={{fontSize:12,padding:"7px 13px",borderRadius:20,background:"#e8f7f2",border:"none",color:G,fontWeight:600,flexShrink:0}}>+ Scan</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <div style={{flex:1,height:3,background:"#eee",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:storageInfo.pct>80?"#e24b4a":G,borderRadius:2,width:`${Math.min(100,storageInfo.pct)}%`,transition:"width .3s"}}/>
          </div>
          <span style={{fontSize:10,color:"#ccc",whiteSpace:"nowrap"}}>{storageInfo.usage}KB / {storageInfo.quota}MB</span>
        </div>
        <div style={{display:"flex"}}>
          {[["list","My List"],["compare","Compare"],["split","Split"],["history","History"],["help","Help"],["settings","⚙️"]].map(([t,l])=>(
            <button key={t} style={T(t)} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
      </div>

      {showInstall&&(
        <div style={{margin:"8px 14px 0",padding:"10px 14px",background:"#111",borderRadius:12,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{flex:1,fontSize:12,color:"#fff"}}>Install Smart Grocery on your home screen for offline use</div>
          <button onClick={installApp} style={{fontSize:12,padding:"6px 12px",background:G,color:"#fff",border:"none",borderRadius:8,whiteSpace:"nowrap"}}>Install</button>
          <button onClick={()=>setShowInstall(false)} style={{border:"none",background:"none",color:"#888",fontSize:18,padding:0}}>×</button>
        </div>

            ))}

            <div style={{fontSize:13,fontWeight:700,color:"#333",marginTop:16,marginBottom:8}}>📷 How scanning works</div>
            {[["✏️ Type / Paste","Paste any format — one item per line, comma-separated, or with quantities like 2x Eggs. Auto-detects quantities and guesses the category.","#faeeda","#633806"],["📷 Photo / Camera","Photograph a handwritten list, receipt, or fridge note. Requires an Anthropic API key (free). Claude AI reads the image and extracts all items.","#e8f4fd","#185fa5"],["📧 From Email","Paste the body of any email — a list from family, a meal plan, or an order confirmation. The app strips bullet-pointed items automatically.","#e8f7f2",G]].map(([t,d,bg,col])=>(
              <div key={t} style={{padding:"11px 13px",marginBottom:7,background:bg,borderRadius:11,border:`0.5px solid ${col}25`}}>
                <div style={{fontSize:13,fontWeight:600,color:col,marginBottom:3}}>{t}</div>
                <div style={{fontSize:12,color:"#666",lineHeight:1.5}}>{d}</div>
              </div>
            ))}

            <div style={{fontSize:13,fontWeight:700,color:"#333",marginTop:16,marginBottom:8}}>🏪 Store tips — Hanover, MD</div>
            {[["🇮🇳","Patel Brothers / Tara Vani","Best for spices, basmati rice, lentils, flours — often 40–50% cheaper than mainstream stores."],["🇰🇷","Lotte Plaza / H Mart","Best for Asian produce, frozen dumplings, seafood, Korean snacks, and rice."],["🏪","Costco","Best bulk prices on meat, rice, pantry, and household. Needs membership (~$65/yr)."],["🏪","Sam's Club","Walmart's warehouse club. Great bulk deals on beverages and household. Needs membership (~$50/yr)."],["🛒","ALDI","Best single stop for produce and dairy. Closed Sundays — bring a quarter for the cart."],["🛒","Walmart","Best for pantry staples, beverages, and household in bulk."],["🛒","Food Lion","Best meat department among mid-range stores. Use the loyalty card."],["🛒","Safeway","Use the Safeway app for digital coupons before shopping."]].map(([flag,name,tip])=>(
              <div key={name} style={{display:"flex",gap:9,padding:"9px 12px",marginBottom:6,background:"#fff",border:"0.5px solid #eee",borderRadius:10,alignItems:"flex-start"}}>
                <span style={{fontSize:18,flexShrink:0}}>{flag}</span>
                <div><div style={{fontSize:12,fontWeight:600,color:"#111",marginBottom:1}}>{name}</div><div style={{fontSize:11,color:"#888",lineHeight:1.5}}>{tip}</div></div>
              </div>
            ))}

            <div style={{padding:"11px 13px",background:"#f9f9f7",borderRadius:11,marginTop:16,marginBottom:14,border:"0.5px solid #eee"}}>
              <div style={{fontSize:13,fontWeight:600,color:"#333",marginBottom:4}}>💾 Your data is private</div>
              <div style={{fontSize:12,color:"#888",lineHeight:1.6}}>All lists, history, settings, and stores are saved <strong>only on this device</strong> in IndexedDB. Nothing is uploaded to any server. Go to <strong>Settings → Request persistent storage</strong> to protect your data from being auto-cleared.</div>
            </div>

            <div style={{fontSize:13,fontWeight:700,color:"#333",marginBottom:8}}>❓ FAQ</div>
            {[["Does the app work without internet?","Yes — fully. After first load everything works offline. Only photo scanning needs internet to call the AI."],["Where do I get an Anthropic API key?","Go to console.anthropic.com, create a free account, click API Keys, and create a new key. New accounts get free credits."],["Can I add my local Indian / Korean store?","Yes! Settings → Add a store not in the list. Enter the name, address, and best categories (e.g. spices, rice/grains). Saved instantly."],["How do I install it on my iPhone?","Open the app in Safari → tap Share → Add to Home Screen → Add. Launches fullscreen like a native app."],["What's the difference between Costco and Sam's Club?","Costco is slightly better for meat, produce, and rice. Sam's Club edges it on beverages and household. Both need memberships. Sam's Club (~$50/yr) is cheaper than Costco (~$65/yr)."],["How do I delete my data?","Settings → scroll to Danger Zone → Clear all app data. Wipes everything. Cannot be undone."]].map(([q,a])=>(
              <details key={q} style={{marginBottom:7,border:"0.5px solid #eee",borderRadius:10,overflow:"hidden"}}>
                <summary style={{padding:"11px 13px",fontSize:13,fontWeight:500,cursor:"pointer",background:"#fafafa",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{q}</span><span style={{color:"#bbb",fontSize:16,flexShrink:0,marginLeft:8}}>›</span>
                </summary>
                <div style={{padding:"10px 13px",fontSize:12,color:"#666",lineHeight:1.6,borderTop:"0.5px solid #f0f0f0"}}>{a}</div>
              </details>
            ))}

            <div style={{marginTop:20,padding:"16px 14px",background:"#f0faf6",borderRadius:14,border:`1px solid ${G}25`,textAlign:"center"}}>
              <div style={{fontSize:22,marginBottom:6}}>👋</div>
              <div style={{fontSize:14,fontWeight:700,color:"#111",marginBottom:4}}>Have a question or suggestion?</div>
              <div style={{fontSize:12,color:"#888",marginBottom:14,lineHeight:1.5}}>Found a bug? Want a new feature? Want to add a store?<br/>Reach out anytime — I'd love to hear from you.</div>
              <a href="mailto:roopeshaithal@gmail.com?subject=Smart Grocery App" style={{display:"inline-block",padding:"11px 24px",background:G,color:"#fff",borderRadius:20,fontSize:13,fontWeight:600,textDecoration:"none"}}>
                ✉️ roopeshaithal@gmail.com
              </a>
              <div style={{marginTop:14,fontSize:11,color:"#bbb"}}>Built with ❤️ using React + Claude AI<br/>Version 4.1 · Hanover, MD</div>
            </div>
          </div>
        )}

        {/* ── SETTINGS ── */}
        {tab==="settings"&&(
          <div style={{paddingTop:12}}>
            <div style={{padding:"12px 14px",background:"#f9f9f7",borderRadius:12,marginBottom:18,border:"0.5px solid #eee"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:8}}>💾 On-device storage</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
                {[["Used",`${storageInfo.usage} KB`,"#333"],["Quota",`${storageInfo.quota} MB`,"#333"],["Used %",`${storageInfo.pct}%`,storageInfo.pct>80?"#e24b4a":G]].map(([l,v,c])=>(
                  <div key={l} style={{textAlign:"center",padding:"8px 4px",background:"#fff",borderRadius:8,border:"0.5px solid #eee"}}>
                    <div style={{fontSize:10,color:"#aaa"}}>{l}</div>
                    <div style={{fontSize:15,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:11,color:"#aaa",lineHeight:1.5,marginBottom:8}}>Stored in <strong>IndexedDB</strong> on your device. No server. 100% private.</div>
              <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden",marginBottom:8}}>
                <div style={{height:"100%",background:storageInfo.pct>80?"#e24b4a":G,borderRadius:3,width:`${Math.min(100,storageInfo.pct)}%`}}/>
              </div>
              <button onClick={async()=>{await navigator.storage?.persist?.();alert("Storage marked as persistent — data protected from auto-clear.");}} style={{width:"100%",fontSize:12,padding:"7px",borderRadius:8,background:"#e8f7f2",border:`0.5px solid ${G}30`,color:G}}>Request persistent storage</button>
            </div>

            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>Location</div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input value={locationInput} onChange={e=>handleLocation(e.target.value)} placeholder="City, zip or address" style={{flex:1,fontSize:13}}/>
              <button onClick={()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>handleLocation(`${p.coords.latitude.toFixed(3)}, ${p.coords.longitude.toFixed(3)}`));}} style={{fontSize:11,padding:"0 12px",whiteSpace:"nowrap"}}>📍 GPS</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <span style={{fontSize:12,color:"#888"}}>Radius</span>
              <input type="range" min="2" max="25" step="1" value={radius} onChange={e=>handleRadius(+e.target.value)} style={{flex:1}}/>
              <span style={{fontSize:13,fontWeight:600,minWidth:40}}>{radius} mi</span>
            </div>

            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:4}}>Anthropic API key <span style={{fontWeight:400,color:"#bbb"}}>(for photo scanning)</span></div>
            <div style={{display:"flex",gap:7,marginBottom:4}}>
              <input type={showApiKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-…" style={{flex:1,fontSize:13}}/>
              <button onClick={()=>setShowApiKey(s=>!s)} style={{fontSize:11,padding:"0 10px"}}>{showApiKey?"Hide":"Show"}</button>
              <button onClick={()=>handleApiKey(apiKey)} style={{fontSize:11,padding:"0 11px",background:"#e8f7f2",border:`0.5px solid ${G}30`,color:G}}>Save</button>
            </div>
            <div style={{fontSize:11,color:"#bbb",marginBottom:20,lineHeight:1.5}}>Saved in IndexedDB on this device only. Get a key at <strong>console.anthropic.com</strong></div>

            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:8}}>Preferred stores</div>
            {Object.entries({mainstream:"Mainstream",warehouse:"Warehouse 🏪",indian:"Indian 🇮🇳",korean:"Korean 🇰🇷",asian:"Asian 🌏",custom:"Custom 📍"}).map(([type,label])=>{
              const storesOfType=Object.entries(allStores).filter(([,s])=>s.type===type);
              if(!storesOfType.length)return null;
              return(
                <div key={type} style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:TYPE_META[type]?.color||"#888",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {storesOfType.map(([id,s])=>{
                      const on=preferredStores.includes(id);
                      const tc=TYPE_META[s.type]?.color||"#888";
                      return(
                        <button key={id} onClick={()=>handleStores(preferredStores.includes(id)?preferredStores.filter(x=>x!==id):[...preferredStores,id])} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,padding:"6px 11px",borderRadius:20,background:on?tc+"15":"#f5f5f3",border:on?`1.5px solid ${tc}`:"0.5px solid #eee",color:on?tc:"#666"}}>
                          <span style={{fontSize:13}}>{s.flag}</span>{s.name}{on&&<span style={{fontSize:10,fontWeight:600}}>✓</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            {!addStorePanel?(
              <button onClick={()=>setAddStorePanel(true)} style={{width:"100%",fontSize:12,padding:10,border:"1.5px dashed #ddd",borderRadius:11,background:"transparent",color:"#aaa",marginBottom:16}}>+ Add a store not in the list</button>
            ):(
              <div style={{padding:13,border:"0.5px solid #ddd",borderRadius:13,marginBottom:16,background:"#fafafa"}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:9}}>Add custom store</div>
                <input value={newStore.name} onChange={e=>setNewStore(s=>({...s,name:e.target.value}))} placeholder="Store name (e.g. Bharat Bazaar)" style={{marginBottom:7,fontSize:13}}/>
                <input value={newStore.address} onChange={e=>setNewStore(s=>({...s,address:e.target.value}))} placeholder="Address (e.g. 123 Main St, Hanover MD)" style={{marginBottom:7,fontSize:13}}/>
                <input value={newStore.specialty} onChange={e=>setNewStore(s=>({...s,specialty:e.target.value}))} placeholder="Best categories: spices, rice/grains, produce" style={{marginBottom:10,fontSize:13}}/>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={addCustomStore} style={{flex:1,fontSize:13,padding:9,background:G,color:"#fff",border:"none",borderRadius:9,fontWeight:600}}>Add store</button>
                  <button onClick={()=>setAddStorePanel(false)} style={{fontSize:13,padding:"9px 14px"}}>Cancel</button>
                </div>
              </div>
            )}

            <div style={{marginTop:8,padding:"12px 14px",background:"#fef2f2",borderRadius:11,border:"0.5px solid #fcc"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#e24b4a",marginBottom:8}}>Danger zone</div>
              <button onClick={async()=>{if(confirm("Clear all data? This cannot be undone.")){await Promise.all(Object.values(STORE_NAMES).map(s=>dbClear(s)));setList([]);setHistory([]);setCustomStores([]);setPreferredStores(["aldi","walmart","foodlion","patelBros","lottePlaza","costco","samsclub"]);refreshStorage();}}} style={{width:"100%",fontSize:12,padding:9,borderRadius:9,background:"#fff",border:"0.5px solid #fcc",color:"#e24b4a"}}>Clear all app data</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
