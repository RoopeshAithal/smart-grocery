<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#1d9e75"/>
<title>Smart Grocery Optimizer</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;}
  #root{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative;}
  input,select,textarea,button{font-family:inherit;outline:none;}
  input[type=text],input[type=search],textarea{border:0.5px solid #ccc;border-radius:8px;padding:8px 10px;font-size:14px;width:100%;background:#fff;color:#1a1a1a;}
  input[type=text]:focus,textarea:focus{border-color:#1d9e75;box-shadow:0 0 0 2px #1d9e7520;}
  input[type=range]{width:100%;accent-color:#1d9e75;}
  button{border:0.5px solid #ccc;border-radius:8px;padding:7px 13px;font-size:13px;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s;}
  button:active{transform:scale(0.97);}
  select{border:0.5px solid #ccc;border-radius:8px;padding:6px 8px;font-size:13px;background:#fff;color:#1a1a1a;}
  details>summary{list-style:none;} details>summary::-webkit-details-marker{display:none;}
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px;}
  @media(prefers-color-scheme:dark){
    body{background:#1a1a1a;color:#f0f0f0;}
    #root{background:#111;}
    input[type=text],select,textarea,button{background:#1e1e1e;color:#f0f0f0;border-color:#333;}
    input[type=text]:focus,textarea:focus{border-color:#1d9e75;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef}=React;

const CAT_COLORS={
  dairy:{bg:"#b5d4f4",text:"#0c447c"},
  produce:{bg:"#c0dd97",text:"#27500a"},
  pantry:{bg:"#fac775",text:"#633806"},
  meat:{bg:"#f5c4b3",text:"#712b13"},
  bakery:{bg:"#f4c0d1",text:"#72243e"},
  beverages:{bg:"#cecbf6",text:"#3c3489"},
  frozen:{bg:"#b5d4f4",text:"#185fa5"},
  household:{bg:"#d3d1c7",text:"#444441"},
  spices:{bg:"#f0997b",text:"#712b13"},
  snacks:{bg:"#9fe1cb",text:"#085041"},
  "rice/grains":{bg:"#fac775",text:"#633806"},
};
const ALL_CATS=Object.keys(CAT_COLORS);
const BASE_PRICES={dairy:4.5,produce:3.2,pantry:2.8,meat:8.5,bakery:3.5,beverages:4.2,frozen:5.5,household:6.0,spices:3.0,snacks:2.5,"rice/grains":2.8};

const INIT_HISTORY={
  "Week 1 (Mar 3–9)":[
    {name:"Milk (1 gal)",category:"dairy",qty:1},{name:"Eggs (dozen)",category:"dairy",qty:1},
    {name:"Bread (loaf)",category:"bakery",qty:1},{name:"Chicken breast (2 lb)",category:"meat",qty:1},
    {name:"Bananas",category:"produce",qty:1},{name:"Pasta (1 lb)",category:"pantry",qty:2},
    {name:"Orange juice",category:"beverages",qty:1},{name:"Basmati rice (10 lb)",category:"rice/grains",qty:1},
    {name:"Turmeric powder",category:"spices",qty:1},{name:"Dish soap",category:"household",qty:1},
  ],
  "Week 2 (Mar 10–16)":[
    {name:"Milk (1 gal)",category:"dairy",qty:1},{name:"Eggs (dozen)",category:"dairy",qty:2},
    {name:"Greek yogurt",category:"dairy",qty:3},{name:"Apples (3 lb)",category:"produce",qty:1},
    {name:"Baby spinach",category:"produce",qty:1},{name:"Ground beef (1 lb)",category:"meat",qty:2},
    {name:"Garam masala",category:"spices",qty:1},{name:"Chapati flour (10 lb)",category:"rice/grains",qty:1},
    {name:"Kimchi",category:"pantry",qty:1},{name:"Paper towels",category:"household",qty:1},
  ],
  "Week 3 (Mar 17–23)":[
    {name:"Milk (1 gal)",category:"dairy",qty:1},{name:"Bread (loaf)",category:"bakery",qty:2},
    {name:"Chicken breast (2 lb)",category:"meat",qty:2},{name:"Strawberries",category:"produce",qty:1},
    {name:"Frozen dumplings",category:"frozen",qty:2},{name:"Sesame oil",category:"pantry",qty:1},
    {name:"Cumin seeds",category:"spices",qty:1},{name:"Soda (12-pk)",category:"beverages",qty:1},
  ],
  "Week 4 (Mar 24–30)":[
    {name:"Milk (1 gal)",category:"dairy",qty:1},{name:"Eggs (dozen)",category:"dairy",qty:1},
    {name:"Greek yogurt",category:"dairy",qty:2},{name:"Bananas",category:"produce",qty:1},
    {name:"Salmon fillet",category:"meat",qty:1},{name:"Basmati rice (10 lb)",category:"rice/grains",qty:1},
    {name:"Chili powder",category:"spices",qty:1},{name:"Orange juice",category:"beverages",qty:1},
    {name:"Laundry detergent",category:"household",qty:1},
  ],
};

const STORE_CATALOG={
  aldi:{name:"ALDI",flag:"🛒",tier:1,type:"mainstream",strengths:["produce","dairy","pantry"],mult:{dairy:.9,produce:.85,pantry:.9,meat:1.0,bakery:.95,beverages:.95,frozen:.9,household:1.0,spices:1.1,"rice/grains":1.1,snacks:1.0}},
  walmart:{name:"Walmart",flag:"🛒",tier:1,type:"mainstream",strengths:["pantry","beverages","household"],mult:{dairy:1.0,produce:1.0,pantry:.85,meat:.95,bakery:.9,beverages:.85,frozen:.9,household:.85,spices:1.0,"rice/grains":1.0,snacks:.95}},
  foodlion:{name:"Food Lion",flag:"🛒",tier:2,type:"mainstream",strengths:["meat","dairy","bakery"],mult:{dairy:1.05,produce:1.05,pantry:1.05,meat:.9,bakery:1.0,beverages:1.05,frozen:1.05,household:1.1,spices:1.1,"rice/grains":1.1,snacks:1.0}},
  safeway:{name:"Safeway",flag:"🛒",tier:2,type:"mainstream",strengths:["deli","bakery"],mult:{dairy:1.15,produce:1.1,pantry:1.15,meat:1.05,bakery:1.1,beverages:1.1,frozen:1.1,household:1.1,spices:1.15,"rice/grains":1.15,snacks:1.1}},
  costco:{name:"Costco",flag:"🛒",tier:1,type:"mainstream",strengths:["bulk","meat","pantry"],mult:{dairy:.8,produce:.85,pantry:.75,meat:.85,bakery:.85,beverages:.8,frozen:.85,household:.75,spices:.9,"rice/grains":.75,snacks:.8}},
  traderjoes:{name:"Trader Joe's",flag:"🛒",tier:2,type:"mainstream",strengths:["frozen","snacks"],mult:{dairy:1.05,produce:1.0,pantry:.95,meat:1.1,bakery:1.0,beverages:1.05,frozen:.9,household:1.05,spices:1.0,"rice/grains":1.05,snacks:.9}},
  patelBros:{name:"Patel Brothers",flag:"🇮🇳",tier:1,type:"indian",strengths:["spices","rice/grains","pantry"],mult:{dairy:.85,produce:.9,pantry:.8,meat:.95,bakery:.9,beverages:.9,frozen:.9,household:.95,spices:.55,"rice/grains":.55,snacks:.7}},
  taraVani:{name:"Tara Vani",flag:"🇮🇳",tier:1,type:"indian",strengths:["spices","rice/grains","snacks"],mult:{dairy:.88,produce:.85,pantry:.8,meat:.95,bakery:.88,beverages:.88,frozen:.9,household:.95,spices:.5,"rice/grains":.5,snacks:.65}},
  lottePlaza:{name:"Lotte Plaza",flag:"🇰🇷",tier:2,type:"korean",strengths:["produce","meat","frozen"],mult:{dairy:1.0,produce:.85,pantry:.9,meat:.88,bakery:.95,beverages:.9,frozen:.8,household:1.0,spices:.9,"rice/grains":.75,snacks:.75}},
  hmart:{name:"H Mart",flag:"🇰🇷",tier:2,type:"korean",strengths:["produce","seafood","frozen"],mult:{dairy:1.0,produce:.8,pantry:.9,meat:.85,bakery:.95,beverages:.9,frozen:.78,household:1.0,spices:.85,"rice/grains":.72,snacks:.7}},
  grandMart:{name:"Grand Mart",flag:"🌏",tier:1,type:"asian",strengths:["produce","rice/grains","spices"],mult:{dairy:.95,produce:.8,pantry:.82,meat:.9,bakery:.9,beverages:.88,frozen:.82,household:.95,spices:.65,"rice/grains":.6,snacks:.72}},
};

const TYPE_META={mainstream:{label:"Mainstream",color:"#378add"},indian:{label:"Indian",color:"#d85a30"},korean:{label:"Korean",color:"#7f77dd"},asian:{label:"Asian",color:"#1d9e75"},custom:{label:"Custom",color:"#888780"}};
const TIER_LABELS={1:"Budget",2:"Mid-range",3:"Premium"};

function uid(){return Math.random().toString(36).slice(2);}
function guessCat(n){
  n=n.toLowerCase();
  if(/milk|cheese|yogurt|butter|cream|egg/.test(n))return"dairy";
  if(/apple|banana|spinach|broccoli|tomato|onion|garlic|berry|fruit|vegetable|carrot|mango|avocado/.test(n))return"produce";
  if(/chicken|beef|pork|salmon|fish|shrimp|lamb|turkey|meat/.test(n))return"meat";
  if(/bread|roll|bagel|muffin|cake|cookie/.test(n))return"bakery";
  if(/rice|flour|chapati|atta|lentil|dal|quinoa|oat/.test(n))return"rice/grains";
  if(/turmeric|cumin|garam|masala|chili|spice|coriander|cardamom|cinnamon/.test(n))return"spices";
  if(/juice|soda|water|tea|coffee|drink/.test(n))return"beverages";
  if(/frozen|ice cream|pizza|dumpling/.test(n))return"frozen";
  if(/soap|detergent|paper|towel|tissue|shampoo|toothpaste/.test(n))return"household";
  if(/chip|snack|cracker|nuts|candy|chocolate/.test(n))return"snacks";
  return"pantry";
}
function parseTextList(raw){
  return raw.split(/\n|,|;/).map(l=>l.trim()).filter(Boolean).map(line=>{
    const m=line.match(/^(\d+)[x\s]+(.+)/i)||line.match(/^(.+?)\s+[x×]?\s*(\d+)$/i);
    let name=line,qty=1;
    if(m){if(/^\d/.test(line)){qty=parseInt(m[1]);name=m[2];}else{name=m[1];qty=parseInt(m[2]);}}
    name=name.replace(/^\W+|\W+$/g,"").replace(/\s+/g," ").trim();
    if(!name)return null;
    return{id:uid(),name,qty:isNaN(qty)?1:qty,category:guessCat(name)};
  }).filter(Boolean);
}
function parseEmail(text){
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const items=[];
  lines.forEach(line=>{
    const m=line.match(/^[-•*\d.]+\s*(.+)/);
    if(m){const r=m[1].replace(/\$[\d.]+/g,"").replace(/\(.*?\)/g,"").trim();items.push(...parseTextList(r));}
  });
  return items.length?items:parseTextList(text);
}

function App(){
  const[tab,setTab]=useState("list");
  const[list,setList]=useState(()=>{
    const all=Object.values(INIT_HISTORY).flat();
    const map={};
    all.forEach(it=>{const k=it.name.toLowerCase();if(map[k])map[k].qty+=it.qty;else map[k]={...it,id:uid()};});
    return Object.values(map);
  });
  const[history,setHistory]=useState(INIT_HISTORY);
  const[checked,setChecked]=useState({});
  const[newItem,setNewItem]=useState("");
  const[newCat,setNewCat]=useState("pantry");
  const[newQty,setNewQty]=useState(1);
  const[preferredStores,setPreferredStores]=useState(["aldi","walmart","foodlion","patelBros","lottePlaza"]);
  const[customStores,setCustomStores]=useState([]);
  const[locationInput,setLocationInput]=useState("Hanover, MD");
  const[radius,setRadius]=useState(10);
  const[scanModal,setScanModal]=useState(false);
  const[scanMode,setScanMode]=useState("text");
  const[scanText,setScanText]=useState("");
  const[emailText,setEmailText]=useState("");
  const[scanPreview,setScanPreview]=useState([]);
  const[scanError,setScanError]=useState("");
  const[imgProcessing,setImgProcessing]=useState(false);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("sg_apikey")||"");
  const[showApiKey,setShowApiKey]=useState(false);
  const[histEdit,setHistEdit]=useState(false);
  const[selHist,setSelHist]=useState({});
  const[addStorePanel,setAddStorePanel]=useState(false);
  const[newStore,setNewStore]=useState({name:"",address:"",specialty:""});
  const fileRef=useRef();
  const camRef=useRef();

  const allStores={...STORE_CATALOG,...Object.fromEntries(customStores.map(s=>[s.id,s]))};
  const activeIds=preferredStores.filter(id=>allStores[id]);
  const storeTotals=activeIds.map(id=>({id,store:allStores[id],total:list.reduce((s,it)=>s+(BASE_PRICES[it.category]||3.5)*(allStores[id].mult[it.category]||1)*it.qty,0)})).sort((a,b)=>a.total-b.total);
  const minTotal=storeTotals[0]?.total||0;
  const catGroups={};
  list.forEach(it=>{if(!catGroups[it.category])catGroups[it.category]=[];catGroups[it.category].push(it);});
  const freqMap={};
  Object.values(history).flat().forEach(it=>{const k=it.name.toLowerCase();freqMap[k]=(freqMap[k]||0)+1;});

  function addItem(){if(!newItem.trim())return;setList(l=>[...l,{id:uid(),name:newItem.trim(),category:newCat,qty:newQty}]);setNewItem("");setNewQty(1);}
  function removeItem(id){setList(l=>l.filter(i=>i.id!==id));}
  function toggleCheck(id){setChecked(c=>({...c,[id]:!c[id]}));}
  function updateQty(id,d){setList(l=>l.map(it=>it.id===id?{...it,qty:Math.max(1,it.qty+d)}:it));}
  function updateItemCat(id,cat){setList(l=>l.map(it=>it.id===id?{...it,category:cat}:it));}

  function parseScan(){
    setScanError("");
    const items=parseTextList(scanText);
    if(!items.length){setScanError("No items found — try a different format.");return;}
    setScanPreview(items);
  }
  function confirmScan(){
    const label=`Scanned ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
    setHistory(h=>({[label]:scanPreview.map(({name,category,qty})=>({name,category,qty})),...h}));
    setList(l=>{const m=[...l];scanPreview.forEach(it=>{const ex=m.find(x=>x.name.toLowerCase()===it.name.toLowerCase());if(ex)ex.qty+=it.qty;else m.push({...it,id:uid()});});return[...m];});
    setScanModal(false);setScanText("");setScanPreview([]);setEmailText("");
  }
  async function handleImage(e){
    const file=e.target.files[0];if(!file)return;
    if(!apiKey){setScanError("Enter your Anthropic API key in Settings to use image scanning.");return;}
    setImgProcessing(true);setScanError("");
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const b64=reader.result.split(",")[1];
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"Extract all grocery items from this image. Return ONLY a JSON array like: [{\"name\":\"Milk\",\"qty\":1}]. No explanation, no markdown."}]}]})
        });
        const data=await res.json();
        const raw=data.content?.find(b=>b.type==="text")?.text||"";
        const clean=raw.replace(/```json|```/g,"").trim();
        const parsed=JSON.parse(clean);
        setScanPreview(parsed.map(it=>({id:uid(),name:it.name||"",qty:it.qty||1,category:guessCat(it.name||"")})).filter(i=>i.name));
      }catch(err){setScanError("Could not read image. Check your API key or try typing the list.");}
      setImgProcessing(false);
    };
    reader.readAsDataURL(file);
  }

  function saveApiKey(k){setApiKey(k);localStorage.setItem("sg_apikey",k);}
  function addCustomStore(){
    if(!newStore.name.trim())return;
    const id="custom_"+uid();
    const specs=newStore.specialty.split(",").map(s=>s.trim()).filter(Boolean);
    const mult={};Object.keys(BASE_PRICES).forEach(c=>{mult[c]=1.0;});specs.forEach(c=>{if(mult[c]!==undefined)mult[c]=0.7;});
    setCustomStores(cs=>[...cs,{id,name:newStore.name.trim(),address:newStore.address.trim(),flag:"📍",tier:2,type:"custom",strengths:specs.length?specs:["general"],mult}]);
    setPreferredStores(ps=>[...ps,id]);
    setNewStore({name:"",address:"",specialty:""});setAddStorePanel(false);
  }
  function deleteSelHist(){
    const upd={};
    Object.entries(history).forEach(([w,items])=>{const kept=items.filter((_,i)=>!selHist[`${w}::${i}`]);if(kept.length)upd[w]=kept;});
    setHistory(upd);setSelHist({});
  }
  function addWeekToList(week){
    setList(l=>{const m=[...l];(history[week]||[]).forEach(it=>{const ex=m.find(x=>x.name.toLowerCase()===it.name.toLowerCase());if(ex)ex.qty+=it.qty;else m.push({...it,id:uid()});});return[...m];});
  }

  const T=(t)=>({flex:1,padding:"9px 0",fontSize:11,fontWeight:tab===t?500:400,background:"transparent",border:"none",borderBottom:tab===t?"2px solid #1d9e75":"2px solid transparent",color:tab===t?"#1d9e75":"#888",cursor:"pointer"});

  const green="#1d9e75";
  const card={background:"#fff",border:"0.5px solid #e0e0e0",borderRadius:12,padding:"12px 14px",marginBottom:8};

  return(
    <div style={{maxWidth:480,margin:"0 auto",background:"#fff",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{padding:"12px 14px 0",borderBottom:"0.5px solid #e0e0e0",position:"sticky",top:0,background:"#fff",zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:green,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:600,color:"#111"}}>Smart Grocery</div>
            <div style={{fontSize:11,color:"#888"}}>{locationInput} · {radius} mi · {activeIds.length} stores</div>
          </div>
          <button onClick={()=>setScanModal(true)} style={{fontSize:11,padding:"6px 12px",borderRadius:20,background:"#e8f7f2",border:"none",color:green,cursor:"pointer",fontWeight:600}}>+ Scan</button>
        </div>
        <div style={{display:"flex"}}>
          {[["list","My List"],["compare","Compare"],["split","Split"],["history","History"],["settings","Settings"]].map(([t,l])=>(
            <button key={t} style={T(t)} onClick={()=>setTab(t)}>{l}</button>
          ))}
        </div>
      </div>

      {/* Scan Modal */}
      {scanModal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
          <div style={{background:"#fff",width:"100%",maxWidth:480,margin:"0 auto",borderRadius:"16px 16px 0 0",padding:"16px 16px 32px",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontWeight:600,fontSize:16}}>Add items</div>
              <button onClick={()=>{setScanModal(false);setScanPreview([]);setScanText("");setScanError("");}} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#888",lineHeight:1}}>×</button>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:14}}>
              {[["text","Type / Paste"],["image","Photo"],["email","Email"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setScanMode(m);setScanPreview([]);setScanError("");}} style={{flex:1,fontSize:12,padding:"8px 0",borderRadius:10,background:scanMode===m?"#e8f7f2":"#f5f5f3",border:scanMode===m?`1.5px solid ${green}`:"0.5px solid #ddd",color:scanMode===m?green:"#555",cursor:"pointer",fontWeight:scanMode===m?600:400}}>{l}</button>
              ))}
            </div>

            {scanMode==="text"&&(
              <>
                <textarea value={scanText} onChange={e=>setScanText(e.target.value)} rows={6}
                  placeholder={"Milk\n2x Eggs\nChicken breast\nBasmati rice 2\nGaram masala, cumin..."}
                  style={{width:"100%",fontSize:13,padding:10,borderRadius:10,border:"0.5px solid #ccc",resize:"vertical"}}/>
                <button onClick={parseScan} style={{width:"100%",marginTop:8,padding:10,fontSize:14,fontWeight:600,background:green,color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>Parse list</button>
              </>
            )}
            {scanMode==="image"&&(
              <div>
                <div style={{padding:20,border:"1.5px dashed #ccc",borderRadius:10,textAlign:"center",marginBottom:10,background:"#fafafa"}}>
                  {imgProcessing?<div style={{color:"#888",fontSize:13}}>Reading image with AI…</div>:<div style={{color:"#888",fontSize:13}}>Upload or take a photo of your handwritten list, receipt, or fridge note</div>}
                </div>
                {!apiKey&&<div style={{fontSize:12,color:"#e24b4a",marginBottom:8,padding:"8px 10px",background:"#fef2f2",borderRadius:8}}>Set your Anthropic API key in Settings to enable image scanning.</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>fileRef.current.click()} style={{flex:1,padding:10,fontSize:13,borderRadius:10,cursor:"pointer"}}>Upload photo</button>
                  <button onClick={()=>camRef.current.click()} style={{flex:1,padding:10,fontSize:13,borderRadius:10,cursor:"pointer"}}>Take photo</button>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImage}/>
                <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleImage}/>
              </div>
            )}
            {scanMode==="email"&&(
              <>
                <div style={{fontSize:12,color:"#888",marginBottom:6}}>Paste email body with grocery list, meal plan, or order confirmation.</div>
                <textarea value={emailText} onChange={e=>setEmailText(e.target.value)} rows={7}
                  placeholder={"Hi, here's this week's list:\n- Milk x2\n- Bread\n- Chicken 3 lbs\n- Basmati rice\n- Cumin seeds"}
                  style={{width:"100%",fontSize:13,padding:10,borderRadius:10,border:"0.5px solid #ccc",resize:"vertical"}}/>
                <button onClick={()=>{const items=parseEmail(emailText);setScanPreview(items);if(!items.length)setScanError("No items found — make sure items are on separate lines or use dashes.");}}
                  style={{width:"100%",marginTop:8,padding:10,fontSize:14,fontWeight:600,background:green,color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>Extract items</button>
              </>
            )}

            {scanError&&<div style={{fontSize:12,color:"#e24b4a",marginTop:8,padding:"8px 10px",background:"#fef2f2",borderRadius:8}}>{scanError}</div>}

            {scanPreview.length>0&&(
              <div style={{marginTop:12}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>{scanPreview.length} items found</div>
                <div style={{border:"0.5px solid #e0e0e0",borderRadius:10,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                  {scanPreview.map((it,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderBottom:"0.5px solid #eee"}}>
                      <span style={{flex:1,fontSize:13}}>{it.qty>1?`×${it.qty} `:""}{it.name}</span>
                      <select value={it.category} onChange={e=>{const n=[...scanPreview];n[i]={...n[i],category:e.target.value};setScanPreview(n);}}
                        style={{fontSize:11,padding:"2px 4px",borderRadius:6}}>
                        {ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                      <button onClick={()=>setScanPreview(p=>p.filter((_,j)=>j!==i))} style={{border:"none",background:"none",color:"#e24b4a",fontSize:16,cursor:"pointer",padding:"0 2px"}}>×</button>
                    </div>
                  ))}
                </div>
                <button onClick={confirmScan} style={{width:"100%",marginTop:10,padding:11,fontSize:14,fontWeight:600,background:green,color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>
                  Add {scanPreview.length} items to my list
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{padding:"0 14px 80px"}}>

        {/* LIST TAB */}
        {tab==="list"&&(
          <div>
            <div style={{display:"flex",gap:6,padding:"10px 0 8px",flexWrap:"wrap"}}>
              <input value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="Add item..." style={{flex:2,minWidth:110,fontSize:13}}/>
              <select value={newCat} onChange={e=>setNewCat(e.target.value)} style={{flex:1,minWidth:85,fontSize:11}}>{ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <button onClick={()=>setNewQty(q=>Math.max(1,q-1))} style={{width:26,height:26,padding:0,fontSize:15,borderRadius:6}}>−</button>
                <span style={{fontSize:13,minWidth:18,textAlign:"center"}}>{newQty}</span>
                <button onClick={()=>setNewQty(q=>q+1)} style={{width:26,height:26,padding:0,fontSize:15,borderRadius:6}}>+</button>
              </div>
              <button onClick={addItem} style={{fontSize:13,padding:"0 14px",borderRadius:8,background:green,color:"#fff",border:"none"}}>Add</button>
            </div>
            {list.length===0&&<div style={{padding:40,textAlign:"center",color:"#aaa",fontSize:14}}>Your list is empty — tap <strong>+ Scan</strong> or add items above.</div>}
            {Object.entries(catGroups).map(([cat,items])=>(
              <div key={cat} style={{marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:600,color:"#888",marginBottom:5,letterSpacing:.8,textTransform:"uppercase",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:CAT_COLORS[cat]?.bg||"#ccc",display:"inline-block",border:`1px solid ${CAT_COLORS[cat]?.text||"#aaa"}`}}></span>{cat}
                </div>
                {items.map(item=>{
                  const freq=freqMap[item.name.toLowerCase()]||0;
                  return(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:7,padding:"9px 10px",marginBottom:4,background:"#fff",border:"0.5px solid #e8e8e8",borderRadius:10,opacity:checked[item.id]?.5:1}}>
                      <div onClick={()=>toggleCheck(item.id)} style={{width:18,height:18,border:"1.5px solid #ccc",borderRadius:4,background:checked[item.id]?green:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                        {checked[item.id]&&<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" strokeWidth="2" fill="none"/></svg>}
                      </div>
                      <span style={{flex:1,fontSize:13,textDecoration:checked[item.id]?"line-through":"none"}}>
                        {item.name}
                        {freq>=2&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:10,background:"#faeeda",color:"#633806",marginLeft:5}}>{freq}x/mo</span>}
                      </span>
                      <select value={item.category} onChange={e=>updateItemCat(item.id,e.target.value)} style={{fontSize:10,padding:"2px 3px",border:"none",background:"transparent",color:"#aaa",cursor:"pointer"}}>{ALL_CATS.map(c=><option key={c} value={c}>{c}</option>)}</select>
                      <div style={{display:"flex",alignItems:"center",gap:3}}>
                        <button onClick={()=>updateQty(item.id,-1)} style={{width:22,height:22,padding:0,fontSize:13,borderRadius:5}}>−</button>
                        <span style={{fontSize:13,minWidth:16,textAlign:"center"}}>{item.qty}</span>
                        <button onClick={()=>updateQty(item.id,1)} style={{width:22,height:22,padding:0,fontSize:13,borderRadius:5}}>+</button>
                      </div>
                      <button onClick={()=>removeItem(item.id)} style={{border:"none",background:"none",color:"#ccc",fontSize:18,cursor:"pointer",padding:"0 2px",lineHeight:1}}>×</button>
                    </div>
                  );
                })}
              </div>
            ))}
            {list.length>0&&(
              <div style={{marginTop:8,padding:14,background:"#f0faf6",borderRadius:12,textAlign:"center",border:`1px solid ${green}30`}}>
                <div style={{fontSize:11,color:"#888"}}>best estimated total</div>
                <div style={{fontSize:28,fontWeight:700,color:green}}>${minTotal.toFixed(2)}</div>
                <div style={{fontSize:12,color:"#666"}}>{storeTotals[0]?.store.flag} {storeTotals[0]?.store.name}</div>
              </div>
            )}
          </div>
        )}

        {/* COMPARE TAB */}
        {tab==="compare"&&(
          <div style={{paddingTop:10}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
              {[["items",list.length,"#f5f5f3","#555"],["stores",activeIds.length,"#f5f5f3","#555"],["max save","$"+(storeTotals.length>1?(storeTotals[storeTotals.length-1].total-minTotal).toFixed(0):"0"),"#e8f7f2",green]].map(([l,v,bg,col])=>(
                <div key={l} style={{padding:10,background:bg,borderRadius:10,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#888"}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:700,color:col}}>{v}</div>
                </div>
              ))}
            </div>
            {storeTotals.map((s,i)=>{
              const tc=TYPE_META[s.store.type]?.color||"#888";
              const pct=minTotal>0?((s.total-minTotal)/minTotal*100):0;
              return(
                <div key={s.id} style={{...card,border:i===0?`2px solid ${tc}`:"0.5px solid #e0e0e0"}}>
                  {i===0&&<div style={{fontSize:10,padding:"3px 8px",borderRadius:10,display:"inline-block",marginBottom:6,background:tc+"20",color:tc,fontWeight:600}}>Best price</div>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:16}}>{s.store.flag}</span><span style={{fontWeight:600,fontSize:14}}>{s.store.name}</span></div>
                      {s.store.address&&<div style={{fontSize:11,color:"#888",marginTop:1}}>{s.store.address}</div>}
                      <div style={{fontSize:11,color:"#888"}}>{TYPE_META[s.store.type]?.label} · {TIER_LABELS[s.store.tier]}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:22,fontWeight:700,color:i===0?tc:"#111"}}>${s.total.toFixed(2)}</div>
                      {pct>0&&<div style={{fontSize:10,color:"#aaa"}}>+{pct.toFixed(0)}% vs cheapest</div>}
                    </div>
                  </div>
                  <div style={{marginTop:8,height:5,borderRadius:3,background:"#eee",overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,background:tc,width:`${Math.max(8,100-pct*0.7)}%`}}/></div>
                  <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap"}}>
                    {s.store.strengths.map(cat=><span key={cat} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:CAT_COLORS[cat]?.bg||"#eee",color:CAT_COLORS[cat]?.text||"#333"}}>{cat}</span>)}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* SPLIT TAB */}
        {tab==="split"&&(
          <div style={{paddingTop:10}}>
            <div style={{padding:"9px 12px",background:"#e8f4fd",borderRadius:10,marginBottom:12,fontSize:12,color:"#185fa5"}}>Items routed to whichever preferred store prices each category lowest.</div>
            {(()=>{
              const catBest={};
              Object.keys(BASE_PRICES).forEach(cat=>{let best=null,bm=Infinity;activeIds.forEach(id=>{const m=allStores[id].mult[cat]||1;if(m<bm){bm=m;best=id;}});if(best)catBest[cat]=best;});
              const si={};activeIds.forEach(id=>{si[id]=[];});
              list.forEach(it=>{const b=catBest[it.category];if(b&&si[b])si[b].push(it);});
              const used=activeIds.filter(id=>si[id]?.length>0);
              const grand=used.reduce((sum,id)=>sum+si[id].reduce((s,it)=>s+(BASE_PRICES[it.category]||3.5)*(allStores[id].mult[it.category]||1)*it.qty,0),0);
              return(<>
                {used.map(id=>{
                  const store=allStores[id],items=si[id];
                  const sub=items.reduce((s,it)=>s+(BASE_PRICES[it.category]||3.5)*(store.mult[it.category]||1)*it.qty,0);
                  const tc=TYPE_META[store.type]?.color||"#888";
                  return(
                    <div key={id} style={{marginBottom:10,border:"0.5px solid #e0e0e0",borderRadius:12,overflow:"hidden"}}>
                      <div style={{padding:"9px 14px",background:tc+"15",borderBottom:"0.5px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div><div style={{fontWeight:600,fontSize:13,color:tc}}>{store.flag} {store.name}</div><div style={{fontSize:10,color:"#888"}}>{[...new Set(items.map(i=>i.category))].join(", ")}</div></div>
                        <div style={{fontSize:14,fontWeight:700}}>${sub.toFixed(2)}</div>
                      </div>
                      {items.map(it=>(
                        <div key={it.id} style={{padding:"6px 14px",fontSize:12,borderBottom:"0.5px solid #eee",display:"flex",justifyContent:"space-between"}}>
                          <span>{it.name}{it.qty>1?` ×${it.qty}`:""}</span>
                          <span style={{color:"#888"}}>${((BASE_PRICES[it.category]||3.5)*(store.mult[it.category]||1)*it.qty).toFixed(2)}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
                <div style={{padding:"12px 14px",background:"#f5f5f3",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,fontWeight:600}}>Optimized total</span>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:16,fontWeight:700}}>${grand.toFixed(2)}</div>
                    <div style={{fontSize:11,color:green}}>save ${(storeTotals[storeTotals.length-1]?.total-grand||0).toFixed(2)} vs worst option</div>
                  </div>
                </div>
              </>);
            })()}
          </div>
        )}

        {/* HISTORY TAB */}
        {tab==="history"&&(
          <div style={{paddingTop:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600}}>Shopping history</div>
              <div style={{display:"flex",gap:6}}>
                {histEdit&&Object.values(selHist).some(Boolean)&&<button onClick={deleteSelHist} style={{fontSize:11,padding:"4px 10px",borderRadius:16,background:"#fef2f2",border:"none",color:"#e24b4a",cursor:"pointer"}}>Delete selected</button>}
                <button onClick={()=>{setHistEdit(h=>!h);setSelHist({});}} style={{fontSize:11,padding:"4px 10px",borderRadius:16}}>{histEdit?"Done":"Edit"}</button>
              </div>
            </div>
            <div style={{padding:"10px 12px",background:"#f9f9f7",borderRadius:10,marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,marginBottom:6,color:"#888"}}>Most frequent</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {Object.entries(freqMap).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([name,count])=>(
                  <span key={name} style={{fontSize:11,padding:"3px 8px",borderRadius:12,background:"#faeeda",color:"#633806"}}>{name} <span style={{opacity:.6}}>·{count}x</span></span>
                ))}
              </div>
            </div>
            {Object.keys(history).length===0&&<div style={{padding:30,textAlign:"center",color:"#aaa",fontSize:13}}>No history yet — scan a list to get started.</div>}
            {Object.entries(history).map(([week,items])=>(
              <div key={week} style={{marginBottom:8,border:"0.5px solid #e0e0e0",borderRadius:10,overflow:"hidden"}}>
                <div style={{padding:"9px 12px",background:"#f9f9f7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontSize:13,fontWeight:600}}>{week}</div><div style={{fontSize:11,color:"#888"}}>{items.length} items</div></div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>addWeekToList(week)} style={{fontSize:11,padding:"4px 9px",borderRadius:14,background:"#e8f7f2",border:"none",color:green,cursor:"pointer"}}>+ Add to list</button>
                    {histEdit&&<button onClick={()=>setHistory(h=>{const n={...h};delete n[week];return n;})} style={{fontSize:11,padding:"4px 9px",borderRadius:14,background:"#fef2f2",border:"none",color:"#e24b4a",cursor:"pointer"}}>Delete</button>}
                  </div>
                </div>
                {items.map((it,i)=>(
                  <div key={i} onClick={()=>histEdit&&setSelHist(s=>({...s,[`${week}::${i}`]:!s[`${week}::${i}`]}))}
                    style={{padding:"6px 12px",fontSize:12,borderTop:"0.5px solid #eee",display:"flex",alignItems:"center",gap:8,cursor:histEdit?"pointer":"default",background:selHist[`${week}::${i}`]?"#fef2f2":"transparent"}}>
                    {histEdit&&<div style={{width:14,height:14,border:"1.5px solid #ccc",borderRadius:3,flexShrink:0,background:selHist[`${week}::${i}`]?"#e24b4a":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {selHist[`${week}::${i}`]&&<svg width="8" height="8" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" strokeWidth="2.2" fill="none"/></svg>}
                    </div>}
                    <span style={{flex:1}}>{it.name}{it.qty>1?` ×${it.qty}`:""}</span>
                    <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:CAT_COLORS[it.category]?.bg||"#eee",color:CAT_COLORS[it.category]?.text||"#333"}}>{it.category}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* SETTINGS TAB */}
        {tab==="settings"&&(
          <div style={{paddingTop:12}}>
            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>Location</div>
            <div style={{display:"flex",gap:8,marginBottom:6}}>
              <input value={locationInput} onChange={e=>setLocationInput(e.target.value)} placeholder="City, zip or address" style={{flex:1,fontSize:13}}/>
              <button onClick={()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>setLocationInput(`${p.coords.latitude.toFixed(3)}, ${p.coords.longitude.toFixed(3)}`));}} style={{fontSize:11,padding:"0 11px"}}>GPS</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <span style={{fontSize:12,color:"#888"}}>Radius</span>
              <input type="range" min="2" max="25" step="1" value={radius} onChange={e=>setRadius(+e.target.value)} style={{flex:1}}/>
              <span style={{fontSize:13,fontWeight:600,minWidth:38}}>{radius} mi</span>
            </div>

            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>Anthropic API key <span style={{fontWeight:400,color:"#aaa"}}>(for image scanning)</span></div>
            <div style={{display:"flex",gap:8,marginBottom:4}}>
              <input type={showApiKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,fontSize:13}}/>
              <button onClick={()=>setShowApiKey(s=>!s)} style={{fontSize:11,padding:"0 10px"}}>{showApiKey?"Hide":"Show"}</button>
              <button onClick={()=>saveApiKey(apiKey)} style={{fontSize:11,padding:"0 10px",background:"#e8f7f2",border:`1px solid ${green}30`,color:green}}>Save</button>
            </div>
            <div style={{fontSize:11,color:"#aaa",marginBottom:20}}>Key is saved locally on your device only. Get one at console.anthropic.com</div>

            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:8}}>Preferred stores</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {Object.entries(allStores).map(([id,s])=>{
                const on=preferredStores.includes(id);
                const tc=TYPE_META[s.type]?.color||"#888";
                return(
                  <button key={id} onClick={()=>setPreferredStores(ps=>ps.includes(id)?ps.filter(x=>x!==id):[...ps,id])} style={{display:"flex",alignItems:"center",gap:4,fontSize:12,padding:"5px 10px",borderRadius:20,background:on?tc+"15":"#f5f5f3",border:on?`1.5px solid ${tc}`:"0.5px solid #ddd",color:on?tc:"#555",cursor:"pointer"}}>
                    <span style={{fontSize:13}}>{s.flag}</span>{s.name}{on&&<span style={{fontSize:10}}>✓</span>}
                  </button>
                );
              })}
            </div>
            {!addStorePanel?(
              <button onClick={()=>setAddStorePanel(true)} style={{width:"100%",fontSize:12,padding:9,border:"1.5px dashed #ccc",borderRadius:10,background:"transparent",color:"#888",cursor:"pointer",marginBottom:16}}>+ Add a store not in the list</button>
            ):(
              <div style={{padding:12,border:"0.5px solid #ddd",borderRadius:12,marginBottom:16,background:"#fafafa"}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Add custom store</div>
                <input value={newStore.name} onChange={e=>setNewStore(s=>({...s,name:e.target.value}))} placeholder="Store name (e.g. Bharat Bazaar)" style={{marginBottom:7,fontSize:13}}/>
                <input value={newStore.address} onChange={e=>setNewStore(s=>({...s,address:e.target.value}))} placeholder="Address (e.g. 123 Main St, Hanover MD)" style={{marginBottom:7,fontSize:13}}/>
                <input value={newStore.specialty} onChange={e=>setNewStore(s=>({...s,specialty:e.target.value}))} placeholder="Best categories: spices, rice/grains, produce" style={{marginBottom:10,fontSize:13}}/>
                <div style={{display:"flex",gap:7}}>
                  <button onClick={addCustomStore} style={{flex:1,fontSize:13,padding:8,background:green,color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>Add store</button>
                  <button onClick={()=>setAddStorePanel(false)} style={{fontSize:13,padding:"8px 14px"}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
